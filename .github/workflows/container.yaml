name: container

on:
  push:
    branches:
      - docker/netflow
  pull_request:
    branches:
      - docker/netflow

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: netflow
  GO_VERSION: 1.24.3
  NDPI_VERSION: 4.14
  NTOP_VERSION: 6.4
  NETFLOW2NG_VERSION: 0.0.5

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: generate-metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/docker/netflow' }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: build
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./components
          file: ./components/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.metadata.outputs.labels }}
          annotations: ${{ steps.metadata.outputs.annotations }}
          cache-from: |
            type=gha,scope=${{ matrix.arch }}-main
            type=gha,scope=${{ matrix.arch }}-runtime-deps
            type=gha,scope=${{ matrix.arch }}-build-deps
            type=gha,scope=${{ matrix.arch }}-mise-tools
            type=gha,scope=${{ matrix.arch }}-shared-mise-go-${{ env.GO_VERSION }}
            type=gha,scope=${{ matrix.arch }}-shared-deps
            type=gha,scope=${{ matrix.arch }}-shared-packages
            type=gha,scope=${{ matrix.arch }}-shared-geoip-buildtime
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.arch }}-main
            type=gha,mode=max,scope=${{ matrix.arch }}-runtime-deps
            type=gha,mode=max,scope=${{ matrix.arch }}-build-deps
            type=gha,mode=max,scope=${{ matrix.arch }}-mise-tools
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-mise-go-${{ env.GO_VERSION }}
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-deps
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-packages
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-geoip-buildtime
          provenance: mode=max
          sbom: true
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            NDPI_VERSION=${{ env.NDPI_VERSION }}
            NTOP_VERSION=${{ env.NTOP_VERSION }}
            NETFLOW2NG_VERSION=${{ env.NETFLOW2NG_VERSION }}
            GEOIPUPDATE_ACCOUNT_ID=${{ secrets.GEOIPUPDATE_ACCOUNT_ID || '0' }}
            GEOIPUPDATE_LICENSE_KEY=${{ secrets.GEOIPUPDATE_LICENSE_KEY || '' }}

      - name: export-digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload-digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    outputs:
      image: ${{ steps.metadata.outputs.tags }}
      digest: ${{ steps.merge.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download-digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: buildx
        uses: docker/setup-buildx-action@v3

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/docker/netflow' }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: merge
        id: merge
        working-directory: /tmp/digests
        run: |
          # Verify we have digest files
          digest_files=(*)
          if [ ! -f "${digest_files[0]}" ]; then
            echo "Error: No digest files found"
            exit 1
          fi

          echo "Found digest files: ${digest_files[*]}"

          # Build digest references
          DIGEST_REFS=()
          for digest_file in "${digest_files[@]}"; do
            if [ -f "$digest_file" ]; then
              DIGEST_REFS+=("${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:$digest_file")
            fi
          done

          echo "Using digest references: ${DIGEST_REFS[*]}"

          # Build tag arguments
          TAG_ARGS=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              TAG_ARGS+=("-t" "$tag")
            fi
          done <<< "${{ steps.metadata.outputs.tags }}"

          echo "Creating manifest for tags: ${TAG_ARGS[*]}"

          # Build annotation arguments
          ANNOTATION_ARGS=()
          if [ -n "${{ steps.metadata.outputs.annotations }}" ]; then
            while IFS= read -r annotation; do
              if [ -n "$annotation" ]; then
                ANNOTATION_ARGS+=("--annotation" "$annotation")
              fi
            done <<< "${{ steps.metadata.outputs.annotations }}"
          fi

          # Create manifest with dry-run first to get digest
          DIGEST=$(docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_REFS[@]}" "${ANNOTATION_ARGS[@]}" \
            --dry-run 2>&1 | grep -o 'sha256:[a-f0-9]*' | head -1)

          if [ -z "$DIGEST" ]; then
            echo "Error: Failed to extract digest from dry-run"
            echo "Command output:"
            docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_REFS[@]}" "${ANNOTATION_ARGS[@]}" --dry-run || true
            exit 1
          fi

          echo "Extracted digest: $DIGEST"

          # Actually create the manifest
          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_REFS[@]}" "${ANNOTATION_ARGS[@]}"

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: generate-artifact-attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true

      - name: summary
        run: |
          echo "## Multi-arch Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Created:" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/docker/netflow" ]; then
            echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.merge.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Details:" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.merge.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date:** \`$(date -u +%Y-%m-%d)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Component Versions:" >> $GITHUB_STEP_SUMMARY
          echo "- **Go:** ${{ env.GO_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **nDPI:** ${{ env.NDPI_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ntopng:** ${{ env.NTOP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **netflow2ng:** ${{ env.NETFLOW2NG_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage Examples:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# For testing/development - use latest tag" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/docker/netflow" ]; then
            echo "docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# For production - use specific digest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.merge.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Native ARM64 builds (no emulation)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Proper OCI labels and annotations (manifest + index level)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Minimal tagging: latest tag only, use digest addressing for specificity" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GeoIP databases downloaded at build time" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM and provenance attestations generated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Multi-architecture support (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
