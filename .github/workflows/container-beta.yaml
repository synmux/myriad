name: container-beta

on:
  push:
    branches: [docker/netflow]
  pull_request:
    branches: [docker/netflow]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: netflow
  GO_VERSION: 1.24.3
  NDPI_VERSION: 4.14
  NTOP_VERSION: 6.4
  NETFLOW2NG_VERSION: 0.0.5

jobs:
  prefetch:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
      dockerfile-hash: ${{ steps.cache-key.outputs.dockerfile-hash }}
      packages-hash: ${{ steps.cache-key.outputs.packages-hash }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: cache-key
        id: cache-key
        run: |
          # Validate required files exist
          if [ ! -f "components/Dockerfile" ]; then
            echo "Error: components/Dockerfile not found"
            exit 1
          fi

          DOCKERFILE_HASH=$(sha256sum components/Dockerfile | cut -d' ' -f1)
          PATCH_HASH="${{ hashFiles('components/allow-flows-from-netflow2ng.patch') }}"
          CACHE_KEY="deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-${{ env.GO_VERSION }}-${DOCKERFILE_HASH}-${PATCH_HASH}"

          echo "Generated cache key for ${{ matrix.arch }}: $CACHE_KEY"
          echo "key=$CACHE_KEY" >> "$GITHUB_OUTPUT"
          echo "dockerfile-hash=${DOCKERFILE_HASH}" >> "$GITHUB_OUTPUT"
          echo "packages-hash=$(echo '${{ env.GO_VERSION }}-${{ matrix.arch }}' | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: dependency-cache
        id: dependency-cache
        uses: actions/cache@v4
        with:
          path: /tmp/prefetch-cache
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-${{ env.GO_VERSION }}-
            deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-

      - name: package-metadata-cache
        id: package-metadata-cache
        uses: actions/cache@v4
        with:
          path: /tmp/apt-metadata-cache
          key: packages-metadata-${{ matrix.arch }}-${{ steps.cache-key.outputs.packages-hash }}-${{ steps.cache-key.outputs.dockerfile-hash }}
          restore-keys: |
            packages-metadata-${{ matrix.arch }}-${{ steps.cache-key.outputs.packages-hash }}-
            packages-metadata-${{ matrix.arch }}-

      - name: buildx
        if: steps.dependency-cache.outputs.cache-hit != 'true' || steps.package-metadata-cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: prefetch-dependencies
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: |
          echo "Prefetching dependencies for ${{ matrix.arch }}..."
          mkdir -p /tmp/prefetch-cache

          if ! docker buildx build \
            --platform ${{ matrix.platform }} \
            --target dependency-prefetch \
            --build-arg NDPI_VERSION=${{ env.NDPI_VERSION }} \
            --build-arg NTOP_VERSION=${{ env.NTOP_VERSION }} \
            --build-arg NETFLOW2NG_VERSION=${{ env.NETFLOW2NG_VERSION }} \
            --output type=local,dest=/tmp/prefetch-cache \
            ./components; then
            echo "Error: Failed to prefetch dependencies for ${{ matrix.arch }}"
            exit 1
          fi

          # Validate that prefetch cache was created
          if [ ! -d "/tmp/prefetch-cache" ] || [ -z "$(ls -A /tmp/prefetch-cache)" ]; then
            echo "Error: Prefetch cache directory is empty or doesn't exist"
            exit 1
          fi

          echo "Dependencies prefetched successfully for ${{ matrix.arch }}"

      - name: prefetch-package-metadata
        if: steps.package-metadata-cache.outputs.cache-hit != 'true'
        run: |
          echo "Prefetching package metadata for ${{ matrix.arch }}..."
          mkdir -p /tmp/apt-metadata-cache

          if ! docker run --rm --platform ${{ matrix.platform }} --entrypoint=/bin/bash \
            -v /tmp/apt-metadata-cache:/cache \
            ubuntu:22.04 \
            -c "apt-get update && cp -r /var/lib/apt/lists /cache/ && cp -r /var/cache/apt /cache/ && rm -f /cache/apt/archives/lock /cache/lists/lock && rm -rf /cache/apt/archives/partial /cache/lists/partial"; then
            echo "Error: Failed to prefetch package metadata for ${{ matrix.arch }}"
            exit 1
          fi

          # Validate that metadata cache was created
          if [ ! -d "/tmp/apt-metadata-cache" ] || [ -z "$(ls -A /tmp/apt-metadata-cache)" ]; then
            echo "Error: Package metadata cache directory is empty or doesn't exist"
            exit 1
          fi

          echo "Package metadata prefetched successfully for ${{ matrix.arch }}"

  build:
    runs-on: ${{ matrix.runner }}
    needs: prefetch
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:buildx-stable-1
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: dependency-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: /tmp/prefetch-cache
          key: deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-${{ env.GO_VERSION }}-${{ needs.prefetch.outputs.dockerfile-hash }}-${{ hashFiles('components/allow-flows-from-netflow2ng.patch') }}
          restore-keys: |
            deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-${{ env.GO_VERSION }}-
            deps-${{ matrix.arch }}-${{ env.NDPI_VERSION }}-${{ env.NTOP_VERSION }}-${{ env.NETFLOW2NG_VERSION }}-

      - name: package-metadata-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: /tmp/apt-metadata-cache
          key: packages-metadata-${{ matrix.arch }}-${{ needs.prefetch.outputs.packages-hash }}-${{ needs.prefetch.outputs.dockerfile-hash }}
          restore-keys: |
            packages-metadata-${{ matrix.arch }}-${{ needs.prefetch.outputs.packages-hash }}-
            packages-metadata-${{ matrix.arch }}-

      - name: build
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./components
          file: ./components/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=${{ matrix.arch }}-main
            type=gha,scope=${{ matrix.arch }}-runtime-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,scope=${{ matrix.arch }}-build-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,scope=${{ matrix.arch }}-mise-tools-${{ needs.prefetch.outputs.cache-key }}
            type=gha,scope=${{ matrix.arch }}-shared-mise-go-${{ env.GO_VERSION }}
            type=gha,scope=${{ matrix.arch }}-shared-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,scope=${{ matrix.arch }}-shared-packages-${{ needs.prefetch.outputs.cache-key }}
            type=gha,scope=${{ matrix.arch }}-shared-geoip-buildtime-${{ needs.prefetch.outputs.cache-key }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.arch }}-main
            type=gha,mode=max,scope=${{ matrix.arch }}-runtime-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,mode=max,scope=${{ matrix.arch }}-build-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,mode=max,scope=${{ matrix.arch }}-mise-tools-${{ needs.prefetch.outputs.cache-key }}
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-mise-go-${{ env.GO_VERSION }}
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-deps-${{ needs.prefetch.outputs.cache-key }}
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-packages-${{ needs.prefetch.outputs.cache-key }}
            type=gha,mode=max,scope=${{ matrix.arch }}-shared-geoip-buildtime-${{ needs.prefetch.outputs.cache-key }}
          provenance: mode=max
          sbom: true
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            NDPI_VERSION=${{ env.NDPI_VERSION }}
            NTOP_VERSION=${{ env.NTOP_VERSION }}
            NETFLOW2NG_VERSION=${{ env.NETFLOW2NG_VERSION }}
            GEOIPUPDATE_ACCOUNT_ID=${{ secrets.GEOIPUPDATE_ACCOUNT_ID || '0' }}
            GEOIPUPDATE_LICENSE_KEY=${{ secrets.GEOIPUPDATE_LICENSE_KEY || '' }}
          no-cache-filters: dependency-prefetch
          secrets: |
            APT_METADATA_CACHE=/tmp/apt-metadata-cache

      - name: export-digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload-digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - prefetch
      - build
    outputs:
      image: ${{ steps.metadata.outputs.tags }}
      digest: ${{ steps.merge.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download-digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: buildx
        uses: docker/setup-buildx-action@v3

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: metadata
        id: metadata
        run: |
          # Generate tag-safe branch name
          TAG_SAFE_BRANCH="${{ github.ref_name }}"
          TAG_SAFE_BRANCH="${TAG_SAFE_BRANCH##*/}"
          TAG_SAFE_BRANCH="${TAG_SAFE_BRANCH//[^a-zA-Z0-9._-]/-}"

          # Create timestamp for created label
          CREATED_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          {
            echo "tags<<EOF"
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            if [ "${{ github.ref }}" = "refs/heads/docker/netflow" ]; then
              echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            fi
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG_SAFE_BRANCH}"
            echo "EOF"
            echo "cache-image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:cache"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
            echo "org.opencontainers.image.revision=${{ github.sha }}"
            echo "org.opencontainers.image.created=${CREATED_TIME}"
            echo "org.opencontainers.image.title=${{ env.IMAGE_NAME }}"
            echo "org.opencontainers.image.description=Docker ntopng traffic analysis with netflow2ng support and build-time GeoIP"
            echo "org.opencontainers.image.vendor=${{ github.repository_owner }}"
            echo "org.opencontainers.image.version=${TAG_SAFE_BRANCH}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: merge
        id: merge
        working-directory: /tmp/digests
        run: |
          # Verify we have digest files
          digest_files=(*)
          if [ ! -f "${digest_files[0]}" ]; then
            echo "Error: No digest files found"
            exit 1
          fi

          echo "Found digest files: ${digest_files[*]}"

          # Create manifest list and push
          TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS="$TAGS -t $tag"
          done <<< "${{ steps.metadata.outputs.tags }}"

          # Add cache tag
          TAGS="$TAGS -t ${{ steps.metadata.outputs.cache-image }}"

          # Build digest references
          DIGEST_REFS=""
          for digest_file in "${digest_files[@]}"; do
            if [ -f "$digest_file" ]; then
              DIGEST_REFS="$DIGEST_REFS ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@sha256:$digest_file"
            fi
          done

          echo "Creating manifest for tags: $TAGS"
          echo "Using digest references: $DIGEST_REFS"

          # Create manifest with all tags and capture digest
          DIGEST=$(docker buildx imagetools create $TAGS $DIGEST_REFS \
            --dry-run 2>/dev/null | grep -o 'sha256:[a-f0-9]*' | head -1)

          if [ -z "$DIGEST" ]; then
            echo "Error: Failed to extract digest from dry-run"
            exit 1
          fi

          # Actually create the manifest
          docker buildx imagetools create $TAGS $DIGEST_REFS

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: generate-artifact-attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true

      - name: summary
        run: |
          # Extract tag-safe branch name (part after last slash)
          TAG_SAFE_BRANCH="${{ github.ref_name }}"
          TAG_SAFE_BRANCH="${TAG_SAFE_BRANCH##*/}"
          TAG_SAFE_BRANCH="${TAG_SAFE_BRANCH//[^a-zA-Z0-9._-]/-}"

          echo "## Multi-arch Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Created:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/docker/netflow" ]; then
            echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG_SAFE_BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Details:" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.merge.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cache key:** \`${{ needs.prefetch.outputs.cache-key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Component Versions:" >> $GITHUB_STEP_SUMMARY
          echo "- **Go:** ${{ env.GO_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **nDPI:** ${{ env.NDPI_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ntopng:** ${{ env.NTOP_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **netflow2ng:** ${{ env.NETFLOW2NG_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Architecture-specific dependency and package caching" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Native ARM64 builds (no emulation)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GeoIP databases downloaded at build time" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SBOM and provenance attestations generated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Multi-architecture support (AMD64, ARM64)" >> $GITHUB_STEP_SUMMARY
