procs:
  schema:
    shell: docker run --rm -it --env-file mastodon/.env --network mastodon_external_network --network mastodon_internal_network -v mastodon_mastodonStorage:/mastodon/public/system:rw ghcr.io/glitch-soc/mastodon:v4.5.0 /bin/bash -c "bin/tootctl upgrade storage-schema"
  status:
    shell: docker run --rm -it --env-file mastodon/.env --network mastodon_external_network --network mastodon_internal_network -v mastodon_mastodonStorage:/mastodon/public/system:rw ghcr.io/glitch-soc/mastodon:v4.5.0 /bin/bash -c "bin/tootctl statuses remove --days=7 --clean-followed --compress-database"
  preview:
    shell: docker run --rm -it --env-file mastodon/.env --network mastodon_external_network --network mastodon_internal_network -v mastodon_mastodonStorage:/mastodon/public/system:rw ghcr.io/glitch-soc/mastodon:v4.5.0 /bin/bash -c "bin/tootctl preview_cards remove --days=7"
  media:
    shell: docker run --rm -it --env-file mastodon/.env --network mastodon_external_network --network mastodon_internal_network -v mastodon_mastodonStorage:/mastodon/public/system:rw ghcr.io/glitch-soc/mastodon:v4.5.0 /bin/bash -c "bin/tootctl media remove --days=7 --prune-profiles --include-follows && bin/tootctl media remove --days=7 --remove-headers --include-follows && bin/tootctl media remove-orphans --fix-permissions"
  search:
    shell: docker run --rm -it --env-file mastodon/.env --network mastodon_external_network --network mastodon_internal_network -v mastodon_mastodonStorage:/mastodon/public/system:rw ghcr.io/glitch-soc/mastodon:v4.5.0 /bin/bash -c "bin/tootctl search deploy --reset-chewy"
