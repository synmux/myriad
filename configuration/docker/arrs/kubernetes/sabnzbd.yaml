# -----------------------------------------------------------------------------
# SABnzbd — Usenet downloader.
# Mounts the shared media-data PVC at /data so /data/usenet/complete is on
# the same filesystem as /data/media (hardlink prerequisite).
# -----------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  labels:
    app: sabnzbd
    app.kubernetes.io/part-of: arr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
        app.kubernetes.io/part-of: arr-stack
    spec:
      containers:
        - name: sabnzbd
          image: lscr.io/linuxserver/sabnzbd:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: arr-stack-config
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: data
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  labels:
    app: sabnzbd
    app.kubernetes.io/part-of: arr-stack
spec:
  type: ClusterIP
  selector:
    app: sabnzbd
  ports:
    - name: http
      port: 8080
      targetPort: http
