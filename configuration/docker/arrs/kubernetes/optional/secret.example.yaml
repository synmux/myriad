# -----------------------------------------------------------------------------
# secret.example.yaml — TEMPLATE for the optional services' credentials.
#
# DO NOT commit real values to source control.
# Workflow:
#   cp secret.example.yaml secret.yaml
#   $EDITOR secret.yaml          # paste real credentials
#   kubectl apply -f secret.yaml
#
# secret.yaml is gitignored at the project root.
#
# Both Secrets below are namespaced to `arr-stack` because the optional
# Deployments resolve them from envFrom/secretKeyRef in that namespace.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# vpn-credentials — consumed by the gluetun container.
# Keys mirror the env vars listed in env.example.template at the project
# root. See that file for provider-specific guidance.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: vpn-credentials
  namespace: arr-stack
type: Opaque
stringData:
  VPN_SERVICE_PROVIDER: mullvad
  VPN_TYPE: wireguard
  WIREGUARD_PRIVATE_KEY: YOUR_PRIVATE_KEY_BASE64
  WIREGUARD_ADDRESSES: 10.64.0.2/32
  VPN_SERVER_COUNTRIES: Switzerland
---
# -----------------------------------------------------------------------------
# putio-credentials — consumed by plundrio.
# Generate the OAuth token at https://app.put.io/oauth.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: putio-credentials
  namespace: arr-stack
type: Opaque
stringData:
  PUTIO_TOKEN: oauth_token_string_from_putio_application_page
