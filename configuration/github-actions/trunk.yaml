name: trunk
on:
  push: null
  pull_request: null
jobs:
  trunk:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout
      actions: write # Required for actions/cache, write for uploading artifacts
      pull-requests: write # Required for posting comments on PRs
    steps:
      - uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709
        id: checkout
        name: checkout
        with:
          fetch-depth: 1
      - uses: actions/cache@640a1c2554105b57832a23eea0b4672fc7a790d5
        id: cache
        name: cache
        with:
          path: /home/runner/.cache/trunk
          key: ${{ runner.os }}-trunk-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            ${{ runner.os }}-trunk-
      - id: check
        name: check
        run: |
          curl -fsSLO --retry 3 https://trunk.io/releases/trunk
          chmod +x trunk
          ./trunk check --ci --ci-progress
