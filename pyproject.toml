[project]
name = "sandbox"
version = "0.1.0"
description = "Personal AI sandbox"
readme = "README.md"
authors = [
    { name = "Dave Williams", email = "dave@dave.io" }
]
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.57.1",
    "click>=8.2.1",
    "instructor>=1.9.2",
    "openai>=1.95.1",
    "orjson>=3.10.18",
    "pathlib>=1.0.1",
    "pydantic>=2.11.7",
    "pyyaml>=6.0.2",
    "rich>=14.0.0",
    "tqdm>=4.67.1",
    "typing>=3.10.0.0",
    "typing-extensions>=4.14.1",
]

[project.scripts]
sandbox = "sandbox:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "types-pyyaml>=6.0.12.20250516",
]
