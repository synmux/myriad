[project]
name = "unsubscribe"
version = "0.1.0"
description = "Gmail unsubscribe automation tool"
authors = [{ name = "Dave Williams", email = "dave@davepedu.com" }]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
  "click>=8.0.0",
  "rich>=13.0.0",
  "tqdm>=4.64.0",
  "google-api-python-client>=2.0.0",
  "google-auth-httplib2>=0.2.0",
  "google-auth-oauthlib>=1.0.0",
  "requests>=2.28.0",
  "pandas>=1.5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0.0",
  "pytest-cov>=4.0.0",
  "black>=22.0.0",
  "isort>=5.10.0",
  "mypy>=1.0.0",
]

[project.scripts]
unsubscribe = "unsubscribe.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/unsubscribe"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
