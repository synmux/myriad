[project]
name = "myriad"
version = "0.1.0"
description = "Monorepo for various projects."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "broadlink>=0.19.0",
  "python-rtmidi>=1.5.8",
  "rich>=14.0.0",
  "click>=8.2.1",
  "tqdm>=4.67.1",
  "pillow>=11.3.0",
  "pyyaml>=6.0.2",
  "orjson>=3.10.18",
  "structlog>=25.4.0",
  "pillow-heif>=1.0.0",
]

[dependency-groups]
dev = [
  "black>=25.1.0",
  "bpython>=0.25",
  "isort>=6.0.1",
  "mypy>=1.16.1",
  "pytest>=8.4.1",
  "pytest-cov>=6.2.1",
  "ruff>=0.12.2",
  "types-pyyaml>=6.0.12.20250516",
]

[project.scripts]
dimensions = "dimensions.cli:main"
