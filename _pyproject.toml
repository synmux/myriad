# This is a monorepo for various projects, including dimensions and shotdetect.
# Each project is a separate package within this monorepo.

# [build-system]
# requires = ["hatchling"]
# build-backend = "hatchling.build"

[project]
name = "myriad"
version = "0.1.0"
description = "Monorepo for various projects."
readme = "README.md"
authors = [{ name = "Dave Williams", email = "dave@dave.io" }]
requires-python = ">=3.13"
license = { text = "MIT" }
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Multimedia :: Graphics",
  "Topic :: Scientific/Engineering :: Image Processing",
  "Topic :: Utilities",
]
dependencies = [
  "aiohttp>=3.12.13",
  "asyncio-throttle>=1.0.2",
  "broadlink>=0.19.0",
  "click>=8.2.1",
  "orjson>=3.10.18",
  "pillow-heif>=1.0.0",
  "Pillow>=11.3.0",
  "python-rtmidi>=1.5.8",
  "pyyaml>=6.0.2",
  "rawpy>=0.25.0",
  "requests>=2.32.4",
  "rich>=14.0.0",
  "structlog>=25.4.0",
  "tqdm>=4.67.1",
]

[dependency-groups]
dev = [
  "bpython>=0.25",
  "pytest-asyncio>=1.1.0a1",
  "isort>=6.0.1",
  "mypy>=1.16.1",
  "pytest>=8.4.1",
  "pytest-cov>=6.2.1",
  "types-pyyaml>=6.0.12.20250516",
  "types-requests>=2.31.0",
]

[project.urls]
Homepage = "https://github.com/dave/myriad"
Documentation = "https://github.com/dave/myriad"
Repository = "https://github.com/dave/myriad"
Issues = "https://github.com/dave/myriad/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
