<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Emulator Comparison Tool</title>
    <style>
      :root {
        --color-primary: #2180a0;
        --color-primary-hover: #1b6b85;
        --color-bg: #f5f7fa;
        --color-surface: #ffffff;
        --color-text: #1f2122;
        --color-text-secondary: #626c7d;
        --color-border: #d1d5db;
        --color-success: #2d8c8d;
        --color-warning: #a84b2f;
        --color-danger: #c0152f;
        --color-accent: #32b8c6;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.6;
      }

      .header {
        background: linear-gradient(
          135deg,
          var(--color-primary) 0%,
          #1a5a73 100%
        );
        color: white;
        padding: 3rem 2rem;
        text-align: center;
        box-shadow: var(--shadow-md);
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .header p {
        font-size: 1.1rem;
        opacity: 0.95;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
      }

      .controls {
        background: var(--color-surface);
        padding: 2rem;
        border-radius: 8px;
        margin-bottom: 2rem;
        box-shadow: var(--shadow-sm);
      }

      .control-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .control-item {
        display: flex;
        flex-direction: column;
      }

      label {
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--color-text);
        font-size: 0.95rem;
      }

      select,
      input[type="text"] {
        padding: 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--color-surface);
        color: var(--color-text);
        transition: border-color 0.2s;
      }

      select:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(33, 128, 160, 0.1);
      }

      .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
      }

      button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }

      .btn-primary {
        background: var(--color-primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--color-primary-hover);
        box-shadow: var(--shadow-md);
      }

      .btn-secondary {
        background: #f0f4f8;
        color: var(--color-text);
        border: 1px solid var(--color-border);
      }

      .btn-secondary:hover {
        background: #e6edf3;
      }

      .btn-sm {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }

      .toggle-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }

      .toggle-btn {
        padding: 0.5rem 1rem;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.85rem;
        font-weight: 500;
      }

      .toggle-btn.active {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
      }

      .comparison-table {
        background: var(--color-surface);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: #f9fafb;
        border-bottom: 2px solid var(--color-border);
      }

      th {
        padding: 1rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--color-text);
        position: sticky;
        top: 0;
        background: #f9fafb;
      }

      td {
        padding: 1rem;
        border-bottom: 1px solid var(--color-border);
        font-size: 0.9rem;
      }

      tbody tr:hover {
        background: #f9fafb;
      }

      .terminal-name {
        font-weight: 600;
        color: var(--color-primary);
        min-width: 130px;
      }

      .metric-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 150px;
      }

      .bar {
        flex: 1;
        height: 24px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .bar-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--color-primary),
          var(--color-accent)
        );
        border-radius: 4px;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        color: white;
        min-width: 30px;
      }

      .badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .badge-success {
        background: #dcfce7;
        color: #166534;
      }

      .badge-warning {
        background: #fef3c7;
        color: #92400e;
      }

      .badge-danger {
        background: #fee2e2;
        color: #991b1b;
      }

      .badge-info {
        background: #dbeafe;
        color: #1e40af;
      }

      .badge-free {
        background: #d1fae5;
        color: #065f46;
      }

      .badge-paid {
        background: #fce7f3;
        color: #831843;
      }

      .terminal-card {
        background: var(--color-surface);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-sm);
        border-left: 4px solid var(--color-primary);
      }

      .terminal-card h3 {
        margin-bottom: 0.5rem;
        color: var(--color-primary);
      }

      .terminal-card p {
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
      }

      .card-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .card-item {
        display: flex;
        flex-direction: column;
      }

      .card-label {
        font-weight: 500;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.25rem;
      }

      .card-value {
        font-size: 0.95rem;
        color: var(--color-text);
      }

      .grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 1.5rem;
      }

      .list-view {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .list-view .terminal-card {
        margin-bottom: 0;
        border-radius: 0;
        border-left: none;
        border-bottom: 2px solid var(--color-border);
      }

      .list-view .terminal-card:first-child {
        border-radius: 8px 8px 0 0;
      }

      .list-view .terminal-card:last-child {
        border-radius: 0 0 8px 8px;
        border-bottom: none;
      }

      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 0.75rem 1.5rem;
        background: var(--color-surface);
        border: 2px solid var(--color-border);
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
        font-family: inherit;
      }

      .tab-btn.active {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
      }

      .tab-btn:hover {
        border-color: var(--color-primary);
      }

      .features-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .feature-tag {
        background: #f0f4f8;
        padding: 0.35rem 0.75rem;
        border-radius: 4px;
        font-size: 0.8rem;
        color: var(--color-text-secondary);
      }

      .feature-tag.active {
        background: var(--color-accent);
        color: white;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      .stat-box {
        background: #f9fafb;
        padding: 1rem;
        border-radius: 6px;
        text-align: center;
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--color-primary);
      }

      .stat-label {
        font-size: 0.8rem;
        color: var(--color-text-secondary);
        margin-top: 0.25rem;
      }

      .filter-active {
        background: #dbeafe;
        border: 2px solid var(--color-primary);
      }

      .empty-state {
        text-align: center;
        padding: 3rem 2rem;
        color: var(--color-text-secondary);
      }

      .empty-state h3 {
        color: var(--color-text);
        margin-bottom: 0.5rem;
      }

      @media (max-width: 768px) {
        .header h1 {
          font-size: 1.75rem;
        }

        .control-group {
          grid-template-columns: 1fr;
        }

        .grid-view {
          grid-template-columns: 1fr;
        }

        table {
          font-size: 0.8rem;
        }

        th,
        td {
          padding: 0.75rem 0.5rem;
        }

        .button-group {
          flex-direction: column;
        }

        button,
        .btn-primary,
        .btn-secondary {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>⚡ Terminal Emulator Comparison Tool</h1>
      <p>Comprehensive analysis of 11 modern terminal emulators</p>
    </div>

    <div class="container">
      <!-- Controls Section -->
      <div class="controls">
        <div class="control-group">
          <div class="control-item">
            <label for="viewMode">View Mode</label>
            <select id="viewMode" onchange="updateView()">
              <option value="table">Table View</option>
              <option value="cards">Card Grid View</option>
              <option value="list">List View</option>
            </select>
          </div>

          <div class="control-item">
            <label for="sortBy">Sort By</label>
            <select id="sortBy" onchange="updateView()">
              <option value="name">Name (A-Z)</option>
              <option value="performance">Performance</option>
              <option value="features">Features</option>
              <option value="ease_of_use">Ease of Use</option>
            </select>
          </div>

          <div class="control-item">
            <label for="search">Search Terminal</label>
            <input
              type="text"
              id="search"
              placeholder="e.g., Alacritty, Warp..."
              onkeyup="updateView()"
            />
          </div>
        </div>

        <div>
          <label style="display: block; margin-bottom: 0.75rem"
            >Filter by Features</label
          >
          <div class="toggle-group">
            <button
              class="toggle-btn"
              onclick="toggleFilter('gpu_accelerated', this)"
            >
              GPU Accelerated
            </button>
            <button
              class="toggle-btn"
              onclick="toggleFilter('native_tabs', this)"
            >
              Native Tabs/Splits
            </button>
            <button
              class="toggle-btn"
              onclick="toggleFilter('ai_features', this)"
            >
              AI Features
            </button>
            <button
              class="toggle-btn"
              onclick="toggleFilter('ssh_built_in', this)"
            >
              Built-in SSH
            </button>
            <button
              class="toggle-btn"
              onclick="toggleFilter('open_source', this)"
            >
              Open Source
            </button>
          </div>
        </div>

        <div class="button-group" style="margin-top: 1.5rem">
          <button class="btn-primary" onclick="resetFilters()">
            Reset All Filters
          </button>
        </div>
      </div>

      <!-- Stats Section -->
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="totalCount">11</div>
          <div class="stat-label">Total Terminals</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="gpuCount">7</div>
          <div class="stat-label">GPU Accelerated</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="aiCount">2</div>
          <div class="stat-label">AI Features</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="openSourceCount">9</div>
          <div class="stat-label">Open Source</div>
        </div>
      </div>

      <!-- Main Content Section -->
      <div id="content" style="margin-top: 2rem"></div>
    </div>

      // State management
      let activeFilters = {
        gpu_accelerated: false,
        native_tabs: false,
        ai_features: false,
        ssh_built_in: false,
        open_source: false,
      };

      // Utility functions
      function getFilteredTerminals() {
        let filtered = Object.entries(terminals);
        const search = document.getElementById("search").value.toLowerCase();

        if (search) {
          filtered = filtered.filter(
            ([name, data]) =>
              name.toLowerCase().includes(search) ||
              data.description.toLowerCase().includes(search),
          );
        }

        // Apply feature filters
        const activeFilterKeys = Object.keys(activeFilters).filter(
          (k) => activeFilters[k],
        );
        if (activeFilterKeys.length > 0) {
          filtered = filtered.filter(([name, data]) =>
            activeFilterKeys.every((filter) => data[filter] === true),
          );
        }

        return filtered;
      }

      function getSortedTerminals(terminals) {
        const sortBy = document.getElementById("sortBy").value;
        const sorted = [...terminals];

        if (sortBy === "name") {
          sorted.sort((a, b) => a[0].localeCompare(b[0]));
        } else if (sortBy === "performance") {
          sorted.sort((a, b) => b[1].performance - a[1].performance);
        } else if (sortBy === "features") {
          sorted.sort((a, b) => b[1].features - a[1].features);
        } else if (sortBy === "ease_of_use") {
          sorted.sort((a, b) => b[1].ease_of_use - a[1].ease_of_use);
        }

        return sorted;
      }

      function toggleFilter(filterName, element) {
        activeFilters[filterName] = !activeFilters[filterName];
        element.classList.toggle("active");
        updateView();
      }

      function resetFilters() {
        Object.keys(activeFilters).forEach(
          (key) => (activeFilters[key] = false),
        );
        document
          .querySelectorAll(".toggle-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById("search").value = "";
        updateView();
      }

      function updateStats(filtered) {
        document.getElementById("totalCount").textContent =
          Object.keys(terminals).length;
        document.getElementById("gpuCount").textContent = Object.values(
          terminals,
        ).filter((t) => t.gpu_accelerated).length;
        document.getElementById("aiCount").textContent = Object.values(
          terminals,
        ).filter((t) => t.ai_features).length;
        document.getElementById("openSourceCount").textContent = Object.values(
          terminals,
        ).filter((t) => t.open_source).length;
      }

      function renderTable(terminals) {
        let html = '<div class="comparison-table"><table>';
        html +=
          "<thead><tr><th>Terminal</th><th>Performance</th><th>Features</th><th>Ease of Use</th><th>CPU</th><th>Price</th><th>Key Features</th></tr></thead>";
        html += "<tbody>";

        terminals.forEach(([name, data]) => {
          html += `<tr>
                    <td class="terminal-name">${name}</td>
                    <td>
                        <div class="metric-bar">
                            <div class="bar">
                                <div class="bar-fill" style="width: ${data.performance}%">${data.performance}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="metric-bar">
                            <div class="bar">
                                <div class="bar-fill" style="width: ${data.features}%">${data.features}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div class="metric-bar">
                            <div class="bar">
                                <div class="bar-fill" style="width: ${data.ease_of_use}%">${data.ease_of_use}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge badge-info">${data.idle_cpu}</span></td>
                    <td><span class="badge ${data.price === "Free" ? "badge-free" : "badge-paid"}">${data.price}</span></td>
                    <td><div class="features-list">${data.key_features
                      .slice(0, 2)
                      .map((f) => `<span class="feature-tag">${f}</span>`)
                      .join("")}</div></td>
                </tr>`;
        });

        html += "</tbody></table></div>";
        return html;
      }

      function renderCards(terminals) {
        return `<div class="grid-view">
                ${terminals
                  .map(
                    ([name, data]) => `
                    <div class="terminal-card">
                        <h3>${name}</h3>
                        <p>${data.description}</p>
                        <div class="card-content">
                            <div class="card-item">
                                <div class="card-label">Performance</div>
                                <div class="bar" style="margin-top: 0.5rem;">
                                    <div class="bar-fill" style="width: ${data.performance}%">${data.performance}</div>
                                </div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Features</div>
                                <div class="bar" style="margin-top: 0.5rem;">
                                    <div class="bar-fill" style="width: ${data.features}%">${data.features}</div>
                                </div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Ease of Use</div>
                                <div class="bar" style="margin-top: 0.5rem;">
                                    <div class="bar-fill" style="width: ${data.ease_of_use}%">${data.ease_of_use}</div>
                                </div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">CPU (Idle)</div>
                                <div class="card-value">${data.idle_cpu}</div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Price</div>
                                <div class="card-value"><span class="badge ${data.price === "Free" ? "badge-free" : "badge-paid"}">${data.price}</span></div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Platforms</div>
                                <div class="card-value">${data.platforms.length} systems</div>
                            </div>
                        </div>
                        <div class="features-list">
                            ${data.key_features.map((f) => `<span class="feature-tag">${f}</span>`).join("")}
                        </div>
                        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
                            <div style="font-size: 0.85rem; color: #626c7d;">Best for: ${data.best_for.join(", ")}</div>
                        </div>
                    </div>
                `,
                  )
                  .join("")}
            </div>`;
      }

      function renderList(terminals) {
        return `<div class="comparison-table">
                ${terminals
                  .map(
                    ([name, data]) => `
                    <div class="terminal-card">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                            <div>
                                <h3>${name}</h3>
                                <p style="margin: 0;">${data.description}</p>
                            </div>
                            <span class="badge ${data.price === "Free" ? "badge-free" : "badge-paid"}">${data.price}</span>
                        </div>
                        <div class="card-content">
                            <div class="card-item">
                                <div class="card-label">Performance: ${data.performance}</div>
                                <div class="bar">
                                    <div class="bar-fill" style="width: ${data.performance}%"></div>
                                </div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Features: ${data.features}</div>
                                <div class="bar">
                                    <div class="bar-fill" style="width: ${data.features}%"></div>
                                </div>
                            </div>
                            <div class="card-item">
                                <div class="card-label">Ease of Use: ${data.ease_of_use}</div>
                                <div class="bar">
                                    <div class="bar-fill" style="width: ${data.ease_of_use}%"></div>
                                </div>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                            <div>
                                <div class="card-label">CPU (Idle)</div>
                                <div class="card-value">${data.idle_cpu}</div>
                            </div>
                            <div>
                                <div class="card-label">Startup</div>
                                <div class="card-value">${data.startup_ms}ms</div>
                            </div>
                            <div>
                                <div class="card-label">Platforms</div>
                                <div class="card-value">${data.platforms.join(", ")}</div>
                            </div>
                            <div>
                                <div class="card-label">Language</div>
                                <div class="card-value">${data.language}</div>
                            </div>
                        </div>
                        <div style="margin-top: 1rem;">
                            <div class="card-label">Key Features</div>
                            <div class="features-list">
                                ${data.key_features.map((f) => `<span class="feature-tag">${f}</span>`).join("")}
                            </div>
                        </div>
                        <div style="margin-top: 0.75rem; padding-top: 1rem; border-top: 1px solid #e5e7eb;">
                            <div style="font-size: 0.85rem; color: #626c7d;"><strong>Best for:</strong> ${data.best_for.join(", ")}</div>
                        </div>
                    </div>
                `,
                  )
                  .join("")}
            </div>`;
      }

      function updateView() {
        const viewMode = document.getElementById("viewMode").value;
        const filtered = getFilteredTerminals();

        if (filtered.length === 0) {
          document.getElementById("content").innerHTML = `
                    <div class="empty-state">
                        <h3>No terminals found</h3>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
          return;
        }

        const sorted = getSortedTerminals(filtered);
        let html = "";

        if (viewMode === "table") {
          html = renderTable(sorted);
        } else if (viewMode === "cards") {
          html = renderCards(sorted);
        } else if (viewMode === "list") {
          html = renderList(sorted);
        }

        document.getElementById("content").innerHTML = html;
        updateStats(filtered);
      }

      // Initialize
      updateView();
    </script>
  </body>
</html>
